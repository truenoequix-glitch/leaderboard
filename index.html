<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>zTeam | Leaderboard & Servers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d111a; color: white; font-family: 'Inter', sans-serif; }
        
        .player-card {
            background: #111723; border: 1px solid #1f283d;
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.3s ease;
        }
        .player-card:hover {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        /* ESCALA DE COLORES DE TIERS */
        .tier-s-plus { color: #ff0000; text-shadow: 0 0 10px rgba(255, 0, 0, 0.6); font-weight: 900; } /* Rojo Intenso */
        .tier-s { color: #ff4d4d; text-shadow: 0 0 8px rgba(255, 77, 77, 0.4); } /* Rojo Normal */
        .tier-a-plus { color: #ff8c00; } /* Naranja */
        .tier-a-minus { color: #ffcc00; } /* Amarillo */
        .tier-b-plus { color: #00ff00; } /* Verde */
        .tier-b { color: #00008b; } /* Azul Oscuro */

        .server-block {
            background: #161d2b; border: 1px solid #1f283d;
            border-radius: 12px; padding: 15px; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
        .server-block:hover {
            background: #1e293b; border-color: #ff4d4d;
            transform: translateY(-5px);
        }

        #copy-toast {
            visibility: hidden; min-width: 200px; background-color: #ff4d4d;
            color: #fff; text-align: center; border-radius: 8px; padding: 12px;
            position: fixed; z-index: 50; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold;
        }
        #copy-toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="copy-toast">¡IP Copiada!</div>

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row items-center justify-between bg-black p-6 rounded-2xl border-2 border-[#ff4d4d] mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-[#ff4d4d] p-4 rounded-lg shadow-lg">
                    <h1 class="text-3xl font-black italic tracking-tighter text-black">ZTEAM</h1>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white">Leaderboard Oficial</h2>
                    <p class="text-xs text-[#ff4d4d] font-black uppercase tracking-widest">Comunidad Competitiva</p>
                </div>
            </div>
            
            <a href="https://discord.gg/XG8EpJXuXv" target="_blank" class="transition-transform hover:scale-110">
                <img id="img-discord" src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" alt="Discord" class="w-14 h-14">
            </a>
        </div>

        <div class="mb-12">
            <h3 class="text-sm font-black text-gray-500 mb-4 uppercase tracking-[0.2em]">Servidores de Test</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="server-block" onclick="copyIP('mc.hycraft.us')">
                    <img id="img-hycraft" src="https://i.postimg.cc/C5J0QhQz/hyc.png" class="w-12 mx-auto mb-2">
                    <span class="block text-xs font-black">HYCRAFT</span>
                </div>
                <div class="server-block" onclick="copyIP('www.hypixel.net')">
                    <img id="img-hypixel" src="https://i.postimg.cc/sxKzNjN1/hyp.png" class="w-12 mx-auto mb-2">
                    <span class="block text-xs font-black">HYPIXEL</span>
                </div>
                <div class="server-block" onclick="copyIP('ghostly.live')">
                    <img id="img-ghostly" src="https://i.postimg.cc/Hn3mhYhs/gh.png" class="w-12 mx-auto mb-2">
                    <span class="block text-xs font-black">GHOSTLY</span>
                </div>
                <div class="server-block" onclick="copyIP('minemen.live')">
                    <img id="img-minemen" src="https://i.postimg.cc/L5vSb9b5/mmc.png" class="w-12 mx-auto mb-2">
                    <span class="block text-xs font-black">MINEMEN</span>
                </div>
            </div>
        </div>

        <div id="leaderboard" class="space-y-3"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv';

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let players = results.data.filter(r => r.UUID);
                    players.sort((a, b) => parseInt(b.Puntos || 0) - parseInt(a.Puntos || 0));

                    const container = document.getElementById('leaderboard');
                    container.innerHTML = '';

                    players.forEach((p, index) => {
                        let rankColor = index === 0 ? "text-yellow-400" : (index === 1 ? "text-slate-300" : (index === 2 ? "text-orange-400" : "text-gray-500"));
                        
                        // Lógica de colores por Tier específico
                        let tierClass = "";
                        let t = p.Tier.trim().toUpperCase();
                        
                        if (t === "S+") tierClass = "tier-s-plus";
                        else if (t === "S") tierClass = "tier-s";
                        else if (t === "A+") tierClass = "tier-a-plus";
                        else if (t === "A-") tierClass = "tier-a-minus";
                        else if (t === "B+") tierClass = "tier-b-plus";
                        else if (t === "B") tierClass = "tier-b";

                        let cleanUUID = p.UUID.replace(/-/g, "").trim();

                        container.innerHTML += `
                            <div class="player-card">
                                <div class="flex items-center gap-5">
                                    <span class="text-2xl font-black italic ${rankColor}">#${index + 1}</span>
                                    <img src="https://visage.surgeplay.com/bust/64/${cleanUUID}" 
                                         class="h-14 w-14 rounded-lg bg-[#1a2235]" 
                                         onerror="this.src='https://visage.surgeplay.com/bust/64/steve'">
                                    <div>
                                        <div class="font-black uppercase italic text-lg leading-tight text-gray-100">${p.Jugador}</div>
                                        <div class="text-[10px] font-black text-gray-500 tracking-widest uppercase">${p.Region}</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="font-black text-xl italic ${tierClass}">${p.Tier}</div>
                                    <div class="text-[10px] font-bold text-gray-400 tracking-tighter uppercase">${p.Puntos} ELO</div>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        }

        function copyIP(ip) {
            navigator.clipboard.writeText(ip);
            var x = document.getElementById("copy-toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }

        window.onload = loadData;
    </script>
</body>
</html>
