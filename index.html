<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>zTeam | Leaderboard Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #090d16; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* TARJETA DE JUGADOR PRINCIPAL */
        .player-card {
            background: linear-gradient(90deg, #0f1422 0%, #0b0f19 100%); 
            border: 1px solid #172030; border-radius: 8px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.25s ease; cursor: pointer;
            position: relative; overflow: hidden; height: 72px;
        }
        .player-card:hover { border-color: #ff4d4d; transform: translateX(4px); }

        /* ZONA DE POSICIÓN CORTADA DIAGONAL */
        .rank-badge-zone {
            height: 100%; width: 135px; display: flex; align-items: center; padding-left: 15px;
            position: relative; z-index: 2; clip-path: polygon(0 0, 85% 0, 65% 100%, 0% 100%);
        }
        .bg-top1 { background: linear-gradient(135deg, #e0a910 0%, #8c6603 100%); }
        .bg-top2 { background: linear-gradient(135deg, #a1a8b8 0%, #5d6370 100%); }
        .bg-top3 { background: linear-gradient(135deg, #cc6925 0%, #783a11 100%); }
        .bg-normal-rank { background: linear-gradient(135deg, #161f30 0%, #0f1522 100%); border-right: 2px solid #222d42; }
        .rank-num-text { font-size: 1.6rem; font-weight: 900; font-style: italic; letter-spacing: -1px; }

        .avatar-inside-rank { height: 100%; width: 55px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .avatar-inside-rank img { height: 115%; object-fit: contain; transform: translateY(8px); }

        /* EFECTO DE DESTELLO LUMINOSO (TOP 1, 2, 3) */
        .podium-glow::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transform: skewX(-25deg); animation: sweepGlow 5s infinite ease-in-out;
        }
        @keyframes sweepGlow { 0% { left: -150%; } 12% { left: 150%; } 100% { left: 150%; } }

        /* CIRCULOS DE TIERS MINIATURA (LISTA PRINCIPAL) */
        .tier-mini-badge { display: flex; flex-direction: column; align-items: center; width: 45px; }
        .tier-circle-icon {
            width: 36px; height: 36px; background: #121824; border: 2px solid #222e45;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 5px; overflow: hidden;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
        }
        .tier-circle-icon img { width: 100%; height: 100%; object-fit: contain; }
        .tier-label-sub { font-size: 10px; font-weight: 900; margin-top: 3px; text-transform: uppercase; text-align: center; text-shadow: 0px 1px 3px rgba(0,0,0,0.8); }

        /* ESTILOS DE COLORES S+, S, A+ DE MCTIERS */
        .tier-s-plus { color: #ffcc00; text-shadow: 0 0 6px rgba(255,204,0,0.4); }
        .tier-s { color: #ffaa00; }
        .tier-a-plus { color: #ff5555; text-shadow: 0 0 6px rgba(255,85,85,0.4); }
        .tier-a { color: #ff3333; }
        .tier-b-plus { color: #ff55ff; }
        .tier-b { color: #aa00aa; }
        .tier-none { color: #555555; }

        /* CAJAS DE DISEÑO CORTADO DENTRO DEL MODAL */
        .modal-position-box {
            background: #121824; border: 1px solid #1f2a3f; border-radius: 6px;
            display: flex; align-items: center; overflow: hidden; height: 44px; margin-bottom: 8px;
        }
        .modal-position-left {
            height: 100%; width: 90px; display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; font-weight: 900; font-style: italic;
            clip-path: polygon(0 0, 100% 0, 78% 100%, 0% 100%);
        }

        /* MODAL */
        #player-modal {
            display: none; position: fixed; inset: 0; background: rgba(4,6,10,0.95);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0b0f19; border: 1px solid #1f2a3f; width: 95%; max-width: 410px;
            padding: 24px; border-radius: 16px; position: relative; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        
        .modal-content::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="p-4 md:p-10 bg-[#05070c]">

    <div id="player-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl font-bold" onclick="closeModal()">&times;</button>
            
            <div class="text-center mb-5">
                <div class="relative inline-block mb-2">
                    <img id="m-img" src="" class="w-20 h-20 rounded-full border-2 border-yellow-500/80 p-0.5 bg-[#121824]">
                </div>
                <h2 id="m-name" class="text-2xl font-black tracking-tight text-white mb-0.5"></h2>
                <div id="m-rank" class="inline-flex items-center gap-1.5 bg-yellow-500/10 border border-yellow-500/30 text-yellow-400 text-[10px] font-black px-3 py-0.5 rounded-full uppercase tracking-wider">
                    ⭐ Combat Master
                </div>
                <p id="m-region" class="text-gray-500 text-xs font-bold mt-1 uppercase tracking-wider"></p>
            </div>

            <div class="mb-5">
                <p class="text-[9px] font-black text-gray-400 mb-1.5 tracking-widest uppercase">Perfiles Sociales</p>
                <div id="redes-container" class="grid grid-cols-2 gap-2">
                </div>
            </div>

            <div class="mb-2">
                <p class="text-[9px] font-black text-gray-400 mb-2 tracking-widest uppercase">Estadísticas por Modalidad</p>
                
                <div class="modal-position-box">
                    <div id="m-box-bg-gen" class="modal-position-left text-black bg-[#e0a910]">
                        <span id="m-pos-gen">1.</span>
                    </div>
                    <div class="flex items-center justify-between flex-1 px-4">
                        <span class="text-xs font-black tracking-wider text-gray-200 uppercase">🌍 OVERALL</span>
                        <span id="m-elo-gen" class="text-xs font-bold text-gray-400"></span>
                    </div>
                </div>

                <div class="modal-position-box">
                    <div id="m-box-bg-bf" class="modal-position-left text-white bg-red-600">
                        <span id="m-pos-bf">-</span>
                    </div>
                    <div class="flex items-center justify-between flex-1 px-4">
                        <span class="text-xs font-black tracking-wider text-gray-200 uppercase">⚔️ BEDFIGHT</span>
                        <span id="m-elo-bf" class="text-xs font-bold text-gray-400"></span>
                    </div>
                </div>

                <div class="modal-position-box">
                    <div id="m-box-bg-rk" class="modal-position-left text-white bg-indigo-600">
                        <span id="m-pos-rk">-</span>
                    </div>
                    <div class="flex items-center justify-between flex-1 px-4">
                        <span class="text-xs font-black tracking-wider text-gray-200 uppercase">🏅 RANKED BW</span>
                        <span id="m-elo-rk" class="text-xs font-bold text-gray-400"></span>
                    </div>
                </div>

                <div class="modal-position-box">
                    <div id="m-box-bg-bw" class="modal-position-left text-white bg-emerald-600">
                        <span id="m-pos-bw">-</span>
                    </div>
                    <div class="flex items-center justify-between flex-1 px-4">
                        <span class="text-xs font-black tracking-wider text-gray-200 uppercase">🛏️ BEDWARS</span>
                        <span id="m-elo-bw" class="text-xs font-bold text-gray-400"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col sm:flex-row items-center justify-between bg-black p-4 rounded-xl border-2 border-[#ff4d4d] mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-[#ff4d4d] p-3 rounded shadow-lg"><h1 class="text-2xl font-black italic tracking-tighter text-black">ZTEAM</h1></div>
                <div>
                    <h2 class="text-lg font-bold leading-tight">Leaderboard Oficial</h2>
                    <p class="text-[10px] text-[#ff4d4d] font-black uppercase tracking-widest">Comunidad Competitiva</p>
                </div>
            </div>
            <a href="https://discord.gg/XG8EpJXuXv" target="_blank" class="transition-transform hover:scale-105">
                <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" alt="Discord" class="w-10 h-10">
            </a>
        </div>

        <div class="mb-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-1.5 bg-[#0f1422] p-1.5 rounded-lg border border-gray-800">
                <button onclick="changeMode('general')" id="btn-general" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition bg-[#ff4d4d] text-black">🌍 General</button>
                <button onclick="changeMode('bedfight')" id="btn-bedfight" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">⚔️ Bedfight</button>
                <button onclick="changeMode('ranked')" id="btn-ranked" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">🏅 Ranked BW</button>
                <button onclick="changeMode('bedwars')" id="btn-bedwars" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">🛏️ Bedwars</button>
            </div>
        </div>

        <div id="leaderboard" class="space-y-2.5"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv';
        const DISCORD_INVITE = "https://discord.gg/XG8EpJXuXv";

        // ENLACES CORREGIDOS Y OPERATIVOS DE ICONOS
        const LOGO_TIKTOK = "https://i.ibb.co/WvmnHT5b/tiktok.png";
        const LOGO_INSTAGRAM = "https://i.ibb.co/fwmqzp3/instagram.png";
        const LOGO_BEDFIGHT = "https://i.ibb.co/M5yGmfXd/bedfight.png";
        const LOGO_BEDWARS = "https://i.ibb.co/YFrcLPKp/bedwars.png";
        const LOGO_RBW = "https://i.ibb.co/wrNyMjdy/trophy-cup-graphic-design-template-vector-illustration-png-269506.jpg" alt="trophy-cup-graphic-design-template-vector-illustration-png // Icono pulido de medalla competitiva para RBW

        let globalPlayersData = [];
        let currentMode = 'general';

        // ASIGNACIÓN CORRECTA DE COLORES DE LA PALETA MCTIERS
        function getTierStyleClass(tier) {
            if (!tier || tier.trim() === "" || tier.trim() === "-") return "tier-none";
            let t = tier.trim().toUpperCase();
            if (t.includes("S+")) return "tier-s-plus";
            if (t.includes("S")) return "tier-s";
            if (t.includes("A+")) return "tier-a-plus";
            if (t.includes("A")) return "tier-a";
            if (t.includes("B+")) return "tier-b-plus";
            if (t.includes("B")) return "tier-b";
            return "tier-none";
        }

        function changeMode(mode) {
            currentMode = mode;
            ['general', 'bedfight', 'ranked', 'bedwars'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                btn.className = (m === mode) 
                    ? "py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition bg-[#ff4d4d] text-black"
                    : "py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400";
            });
            renderLeaderboard();
        }

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    globalPlayersData = results.data.map(row => {
                        let normalizedRow = {};
                        for (let key in row) {
                            let cleanKey = key.trim().toLowerCase().replace(/[\s_]/g, '');
                            normalizedRow[cleanKey] = row[key];
                        }
                        return normalizedRow;
                    }).filter(r => r.uuid);
                    renderLeaderboard();
                }
            });
        }

        function getRankOfPlayer(playerUUID, mode) {
            let list = globalPlayersData.map(p => {
                let pts = 0;
                if (mode === 'general') pts = parseInt(p.bedfightpuntos || 0) + parseInt(p.rankedpuntos || 0) + parseInt(p.bedwarspuntos || 0);
                else if (mode === 'bedfight') pts = parseInt(p.bedfightpuntos || 0);
                else if (mode === 'ranked') pts = parseInt(p.rankedpuntos || 0);
                else if (mode === 'bedwars') pts = parseInt(p.bedwarspuntos || 0);
                return { uuid: p.uuid, pts: isNaN(pts) ? 0 : pts };
            });
            list.sort((a, b) => b.pts - a.pts);
            let position = list.findIndex(item => item.uuid === playerUUID) + 1;
            return position > 0 ? position : "-";
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            let sortedPlayers = globalPlayersData.map(p => {
                let bfPts = parseInt(p.bedfightpuntos || 0);
                let rkPts = parseInt(p.rankedpuntos || 0);
                let bwPts = parseInt(p.bedwarspuntos || 0);
                
                if (isNaN(bfPts)) bfPts = 0;
                if (isNaN(rkPts)) rkPts = 0;
                if (isNaN(bwPts)) bwPts = 0;

                let totalPts = bfPts + rkPts + bwPts;
                let targetPts = totalPts;
                let targetTier = p.tier || "-";

                if (currentMode === 'bedfight') { targetPts = bfPts; targetTier = p.bedfighttier || "-"; }
                else if (currentMode === 'ranked') { targetPts = rkPts; targetTier = p.rankedtier || "-"; }
                else if (currentMode === 'bedwars') { targetPts = bwPts; targetTier = p.bedwarstier || "-"; }

                return { ...p, bfPts, rkPts, bwPts, totalPts, targetPts, targetTier };
            });

            sortedPlayers.sort((a, b) => b.targetPts - a.targetPts);

            sortedPlayers.forEach((p, index) => {
                let rank = index + 1;
                let cleanUUID = p.uuid.replace(/-/g, "").trim();
                
                let rankZoneClass = "bg-normal-rank";
                let podiumCardClass = "";
                if (rank === 1) { rankZoneClass = "bg-top1"; podiumCardClass = "podium-glow border-yellow-600/50"; }
                else if (rank === 2) { rankZoneClass = "bg-top2"; podiumCardClass = "podium-glow border-slate-500/50"; }
                else if (rank === 3) { rankZoneClass = "bg-top3"; podiumCardClass = "podium-glow border-amber-800/50"; }

                let rankNumColor = rank <= 3 ? "text-white" : "text-gray-400";
                let pString = encodeURIComponent(JSON.stringify(p));

                let rankTitle = "Combat Ace";
                if(p.targetPts >= 250) rankTitle = "Combat Master";
                if(p.targetPts >= 500) rankTitle = "Combat Sorcerer";

                let classBf = getTierStyleClass(p.bedfighttier);
                let classRk = getTierStyleClass(p.rankedtier);
                let classBw = getTierStyleClass(p.bedwarstier);

                let labelBf = (p.bedfighttier && p.bedfighttier.trim() !== "") ? p.bedfighttier : "-";
                let labelRk = (p.rankedtier && p.rankedtier.trim() !== "") ? p.rankedtier : "-";
                let labelBw = (p.bedwarstier && p.bedwarstier.trim() !== "") ? p.bedwarstier : "-";

                container.innerHTML += `
                    <div class="player-card ${podiumCardClass}" onclick="openModal('${pString}', '${cleanUUID}', '${rankTitle}')">
                        <div class="flex items-center h-full">
                            <div class="rank-badge-zone ${rankZoneClass}">
                                <span class="rank-num-text ${rankNumColor}">${rank}.</span>
                                <div class="avatar-inside-rank">
                                    <img src="https://visage.surgeplay.com/bust/64/${cleanUUID}" onerror="this.src='https://visage.surgeplay.com/bust/64/steve'">
                                </div>
                            </div>
                            
                            <div class="ml-4">
                                <div class="font-black uppercase italic text-sm text-gray-100">${p.jugador}</div>
                                <div class="flex items-center gap-1.5 mt-0.5">
                                    <span class="text-[9px] text-gray-400 font-bold uppercase">${rankTitle}</span>
                                    <span class="text-[9px] text-gray-600 font-bold">•</span>
                                    <span class="text-[9px] text-[#ff4d4d] font-black uppercase">${p.targetPts} PTS</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2.5 pr-4">
                            <div class="tier-mini-badge ${classBf}">
                                <div class="tier-circle-icon"><img src="${LOGO_BEDFIGHT}"></div>
                                <span class="tier-label-sub">${labelBf}</span>
                            </div>
                            <div class="tier-mini-badge ${classRk}">
                                <div class="tier-circle-icon"><img src="${LOGO_RBW}"></div>
                                <span class="tier-label-sub">${labelRk}</span>
                            </div>
                            <div class="tier-mini-badge ${classBw}">
                                <div class="tier-circle-icon"><img src="${LOGO_BEDWARS}"></div>
                                <span class="tier-label-sub">${labelBw}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(playerDataStr, cleanUUID, rankTitle) {
            const p = JSON.parse(decodeURIComponent(playerDataStr));

            document.getElementById('m-name').innerText = p.jugador;
            document.getElementById('m-img').src = `https://visage.surgeplay.com/bust/128/${cleanUUID}`;
            document.getElementById('m-region').innerText = `Region: ${p.region || 'EU'}`;
            document.getElementById('m-rank').innerText = `⭐ ${rankTitle}`;

            let posGen = getRankOfPlayer(p.uuid, 'general');
            let posBf = getRankOfPlayer(p.uuid, 'bedfight');
            let posRk = getRankOfPlayer(p.uuid, 'ranked');
            let posBw = getRankOfPlayer(p.uuid, 'bedwars');

            document.getElementById('m-pos-gen').innerText = `${posGen}.`;
            document.getElementById('m-pos-bf').innerText = `${posBf}.`;
            document.getElementById('m-pos-rk').innerText = `${posRk}.`;
            document.getElementById('m-pos-bw').innerText = `${posBw}.`;

            let tierGenLabel = (p.tier && p.tier.trim() !== "") ? p.tier : "-";
            let tierBfLabel = (p.bedfighttier && p.bedfighttier.trim() !== "") ? p.bedfighttier : "-";
            let tierRkLabel = (p.rankedtier && p.rankedtier.trim() !== "") ? p.rankedtier : "-";
            let tierBwLabel = (p.bedwarstier && p.bedwarstier.trim() !== "") ? p.bedwarstier : "-";

            document.getElementById('m-elo-gen').innerText = `${tierGenLabel} (${p.totalPts || 0} points)`;
            document.getElementById('m-elo-bf').innerText = `${tierBfLabel} (${p.bfPts || 0} points)`;
            document.getElementById('m-elo-rk').innerText = `${tierRkLabel} (${p.rkPts || 0} points)`;
            document.getElementById('m-elo-bw').innerText = `${tierBwLabel} (${p.bwPts || 0} points)`;

            const boxGen = document.getElementById('m-box-bg-gen');
            if(posGen == 1) boxGen.className = "modal-position-left text-black bg-[#e0a910]";
            else if(posGen == 2) boxGen.className = "modal-position-left text-black bg-[#a1a8b8]";
            else if(posGen == 3) boxGen.className = "modal-position-left text-white bg-[#cc6925]";
            else boxGen.className = "modal-position-left text-gray-300 bg-[#1f293d]";

            // LOGICA REESTRUCTURADA PARA REDES EN FORMATO "GRID COLUMNS"
            const redesContainer = document.getElementById('redes-container');
            redesContainer.innerHTML = '';
            let contadorRedes = 0;

            const crearEnlaceRed = (url, plataforma, iconUrl) => {
                if (url && url.trim() !== "") {
                    contadorRedes++;
                    return `
                        <a href="${url.trim()}" target="_blank" class="bg-[#121824] hover:bg-[#192233] border border-gray-800 text-gray-300 text-[11px] font-bold py-2 px-2 rounded flex items-center justify-center gap-2 transition block truncate">
                            <img src="${iconUrl}" class="w-4 h-4 object-contain"> ${plataforma}
                        </a>`;
                }
                return '';
            };

            redesContainer.innerHTML += crearEnlaceRed(p.redes, 'YouTube', 'https://cdn-icons-png.flaticon.com/512/1384/1384060.png');
            redesContainer.innerHTML += crearEnlaceRed(p.tiktok, 'TikTok', LOGO_TIKTOK);
            redesContainer.innerHTML += crearEnlaceRed(p.instagram, 'Instagram', LOGO_INSTAGRAM);

            if (contadorRedes === 0) {
                redesContainer.className = "block text-center";
                redesContainer.innerHTML = `
                    <a href="${DISCORD_INVITE}" target="_blank" class="bg-[#162030] border border-dashed border-gray-700 hover:border-gray-500 text-gray-400 text-[11px] font-black py-2.5 px-4 rounded w-full block transition uppercase tracking-wider">
                         💬 Agregar en Discord
                    </a>
                `;
            } else {
                redesContainer.className = `grid grid-cols-${contadorRedes > 1 ? 2 : 1} gap-2`;
            }

            document.getElementById('player-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('player-modal').style.display = 'none'; }
        window.onload = loadData;
    </script>
</body>
</html>
