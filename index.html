<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>zTeam | Leaderboard & Tiers Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d111a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* TARJETA DE JUGADOR DE LA LISTA PRINCIPAL */
        .player-card {
            background: linear-gradient(90deg, #111723 0%, #0f1420 100%); 
            border: 1px solid #1f283d; border-radius: 8px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.25s ease; cursor: pointer;
            position: relative; overflow: hidden; height: 72px;
        }
        .player-card:hover { border-color: #ff4d4d; transform: translateX(4px); }

        /* ZONA DE POSICIÓN CORTADA EN TARJETA PRINCIPAL */
        .rank-badge-zone {
            height: 100%; width: 135px; display: flex; align-items: center; padding-left: 15px;
            position: relative; z-index: 2; clip-path: polygon(0 0, 85% 0, 65% 100%, 0% 100%);
        }
        .bg-top1 { background: linear-gradient(135deg, #e0a910 0%, #8c6603 100%); }
        .bg-top2 { background: linear-gradient(135deg, #a1a8b8 0%, #5d6370 100%); }
        .bg-top3 { background: linear-gradient(135deg, #cc6925 0%, #783a11 100%); }
        .bg-normal-rank { background: linear-gradient(135deg, #1b2436 0%, #131a26 100%); border-right: 2px solid #2d364d; }
        .rank-num-text { font-size: 1.5rem; font-weight: 900; font-style: italic; letter-spacing: -1px; }

        .avatar-inside-rank { height: 100%; width: 55px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .avatar-inside-rank img { height: 115%; object-fit: contain; transform: translateY(8px); }

        /* EFECTO DE DESTELLO LUMINOSO CADA 5 SEGUNDOS */
        .podium-glow::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transform: skewX(-25deg); animation: sweepGlow 5s infinite ease-in-out;
        }
        @keyframes sweepGlow { 0% { left: -150%; } 12% { left: 150%; } 100% { left: 150%; } }

        /* CIRCULOS DE TIERS MINIATURA (ESTILO TU SEGUNDA FOTO) */
        .tier-mini-badge {
            display: flex; flex-direction: column; align-items: center; width: 42px;
        }
        .tier-circle-icon {
            width: 32px; height: 32px; background: #171f30; border: 2px solid #2b3752;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 5px;
        }
        .tier-circle-icon img { width: 100%; height: 100%; object-fit: contain; }
        .tier-label-sub { font-size: 9px; font-weight: 900; margin-top: 2px; text-transform: uppercase; }

        /* COLORES Y BRILLOS PARA LOS TEXTOS DE LOS TIERS */
        .tier-ht3 { color: #ff6633; .tier-circle-icon { border-color: #ff6633; } }
        .tier-ht1 { color: #ffcc00; }
        .tier-lt2 { color: #8ba2bd; }
        .tier-b { color: #5555ff; }

        /* DISEÑO DE CAJA CORTADA DENTRO DEL MODAL (IGUAL A LA IMAGEN 1) */
        .modal-position-box {
            background: #171f30; border: 1px solid #25314a; border-radius: 6px;
            display: flex; align-items: center; overflow: hidden; height: 48px;
        }
        .modal-position-left {
            height: 100%; width: 85px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 900; font-style: italic;
            clip-path: polygon(0 0, 100% 0, 78% 100%, 0% 100%);
        }

        /* MODAL */
        #player-modal {
            display: none; position: fixed; inset: 0; background: rgba(5,7,12,0.92);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0f1422; border: 1px solid #25314a; width: 95%; max-width: 420px;
            padding: 24px; border-radius: 16px; position: relative;
        }
    </style>
</head>
<body class="p-4 md:p-10 bg-[#070a12]">

    <div id="copy-toast">¡IP Copiada!</div>

    <div id="player-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl font-bold" onclick="closeModal()">&times;</button>
            
            <div class="text-center mb-5">
                <div class="relative inline-block mb-3">
                    <img id="m-img" src="" class="w-20 h-20 rounded-full border-2 border-yellow-500/80 p-0.5 bg-[#171f30]">
                </div>
                <h2 id="m-name" class="text-2xl font-black tracking-tight text-white mb-1"></h2>
                <div id="m-rank" class="inline-flex items-center gap-1.5 bg-yellow-500/10 border border-yellow-500/30 text-yellow-400 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-wider">
                    ⭐ Combat Master
                </div>
                <p id="m-region" class="text-gray-500 text-xs font-bold mt-1 uppercase tracking-wider"></p>
            </div>

            <div class="mb-5">
                <p class="text-[9px] font-black text-gray-500 mb-2 tracking-widest uppercase">Perfiles Sociales</p>
                <div id="redes-container" class="grid grid-cols-3 gap-2">
                    </div>
            </div>

            <div class="mb-5">
                <p class="text-[9px] font-black text-gray-500 mb-2 tracking-widest uppercase">Position</p>
                <div class="modal-position-box">
                    <div id="m-modal-bg-rank" class="modal-position-left text-black bg-[#e0a910]">
                        <span id="m-pos-num">1.</span>
                    </div>
                    <div class="flex items-center justify-between flex-1 px-4">
                        <span class="text-xs font-black tracking-wider text-gray-200 uppercase flex items-center gap-1.5">
                            🏆 <span id="m-mode-title">OVERALL</span>
                        </span>
                        <span id="m-elo-text" class="text-xs font-bold text-gray-400"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col sm:flex-row items-center justify-between bg-black p-4 rounded-xl border-2 border-[#ff4d4d] mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-[#ff4d4d] p-3 rounded shadow-lg"><h1 class="text-2xl font-black italic tracking-tighter text-black">ZTEAM</h1></div>
                <div>
                    <h2 class="text-lg font-bold leading-tight">Leaderboard Oficial</h2>
                    <p class="text-[10px] text-[#ff4d4d] font-black uppercase tracking-widest">Comunidad Competitiva</p>
                </div>
            </div>
            <a href="https://discord.gg/XG8EpJXuXv" target="_blank" class="transition-transform hover:scale-105">
                <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" alt="Discord" class="w-10 h-10">
            </a>
        </div>

        <div class="mb-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-1.5 bg-[#111723] p-1.5 rounded-lg border border-gray-800">
                <button onclick="changeMode('general')" id="btn-general" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition bg-[#ff4d4d] text-black">🌍 General</button>
                <button onclick="changeMode('bedfight')" id="btn-bedfight" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">⚔️ Bedfight</button>
                <button onclick="changeMode('ranked')" id="btn-ranked" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">🏅 Ranked BW</button>
                <button onclick="changeMode('bedwars')" id="btn-bedwars" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">🛏️ Bedwars</button>
            </div>
        </div>

        <div id="leaderboard" class="space-y-2.5"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv';
        const DISCORD_INVITE = "https://discord.gg/XG8EpJXuXv";

        // URL de iconos representativos de Minecraft para los círculos de modalidades
        const ICON_BF = "https://images.builder.codes/raw/sword_icon.png" || "https://cdn-icons-png.flaticon.com/512/9312/9312173.png"; 
        const ICON_RK = "https://images.builder.codes/raw/ender_icon.png" || "https://cdn-icons-png.flaticon.com/512/3112/3112946.png"; 
        const ICON_BW = "https://images.builder.codes/raw/bed_icon.png" || "https://cdn-icons-png.flaticon.com/512/2919/2919648.png"; 

        let globalPlayersData = [];
        let currentMode = 'general';

        function getTierStyleClass(tier) {
            let t = tier ? tier.trim().toUpperCase() : "B";
            if (t.includes("HT3")) return "tier-ht3";
            if (t.includes("HT1")) return "tier-ht1";
            if (t.includes("LT2")) return "tier-lt2";
            return "tier-b";
        }

        function changeMode(mode) {
            currentMode = mode;
            ['general', 'bedfight', 'ranked', 'bedwars'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                btn.className = (m === mode) 
                    ? "py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition bg-[#ff4d4d] text-black"
                    : "py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400";
            });
            renderLeaderboard();
        }

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    globalPlayersData = results.data.map(row => {
                        let normalizedRow = {};
                        for (let key in row) {
                            let cleanKey = key.trim().toLowerCase().replace(/[\s_]/g, '');
                            normalizedRow[cleanKey] = row[key];
                        }
                        return normalizedRow;
                    }).filter(r => r.uuid);
                    renderLeaderboard();
                }
            });
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            let sortedPlayers = globalPlayersData.map(p => {
                let bfPts = parseInt(p.bedfightpuntos || 0);
                let rkPts = parseInt(p.rankedpuntos || 0);
                let bwPts = parseInt(p.bedwarspuntos || 0);
                
                if (isNaN(bfPts)) bfPts = 0;
                if (isNaN(rkPts)) rkPts = 0;
                if (isNaN(bwPts)) bwPts = 0;

                let totalPts = bfPts + rkPts + bwPts;
                let targetPts = totalPts;
                let targetTier = p.tier || "LT2";

                if (currentMode === 'bedfight') { targetPts = bfPts; targetTier = p.bedfighttier || "LT2"; }
                else if (currentMode === 'ranked') { targetPts = rkPts; targetTier = p.rankedtier || "LT2"; }
                else if (currentMode === 'bedwars') { targetPts = bwPts; targetTier = p.bedwarstier || "LT2"; }

                return { ...p, bfPts, rkPts, bwPts, totalPts, targetPts, targetTier };
            });

            sortedPlayers.sort((a, b) => b.targetPts - a.targetPts);

            sortedPlayers.forEach((p, index) => {
                let rank = index + 1;
                let cleanUUID = p.uuid.replace(/-/g, "").trim();
                
                let rankZoneClass = "bg-normal-rank";
                let podiumCardClass = "";
                if (rank === 1) { rankZoneClass = "bg-top1"; podiumCardClass = "podium-glow border-yellow-600/50"; }
                else if (rank === 2) { rankZoneClass = "bg-top2"; podiumCardClass = "podium-glow border-slate-500/50"; }
                else if (rank === 3) { rankZoneClass = "bg-top3"; podiumCardClass = "podium-glow border-amber-800/50"; }

                let rankNumColor = rank <= 3 ? "text-white" : "text-gray-400";
                let pString = encodeURIComponent(JSON.stringify(p));

                let rankTitle = "Combat Ace";
                if(p.targetPts >= 250) rankTitle = "Combat Master";
                if(p.targetPts >= 500) rankTitle = "Combat Sorcerer";

                // DETECTAR CLASES DE LOS TIERS EN LA HOJA DE EXCEL
                let classBf = getTierStyleClass(p.bedfighttier || 'LT2');
                let classRk = getTierStyleClass(p.rankedtier || 'LT2');
                let classBw = getTierStyleClass(p.bedwarstier || 'LT2');

                container.innerHTML += `
                    <div class="player-card ${podiumCardClass}" onclick="openModal('${pString}', '${rank}', '${rankTitle}')">
                        <div class="flex items-center h-full">
                            <div class="rank-badge-zone ${rankZoneClass}">
                                <span class="rank-num-text ${rankNumColor}">${rank}</span>
                                <div class="avatar-inside-rank">
                                    <img src="https://visage.surgeplay.com/bust/64/${cleanUUID}" onerror="this.src='https://visage.surgeplay.com/bust/64/steve'">
                                </div>
                            </div>
                            
                            <div class="ml-4">
                                <div class="font-black uppercase italic text-sm md:text-md text-gray-100">${p.jugador}</div>
                                <div class="flex items-center gap-1.5 mt-0.5">
                                    <span class="text-[9px] text-gray-400 font-bold uppercase">${rankTitle}</span>
                                    <span class="text-[9px] text-gray-600 font-bold">•</span>
                                    <span class="text-[9px] text-[#ff4d4d] font-black uppercase">${p.targetPts} PTS</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2.5 pr-4">
                            <div class="tier-mini-badge ${classBf}">
                                <div class="tier-circle-icon"><img src="https://cdn-icons-png.flaticon.com/512/9312/9312173.png"></div>
                                <span class="tier-label-sub">${p.bedfighttier || 'LT2'}</span>
                            </div>
                            <div class="tier-mini-badge ${classRk}">
                                <div class="tier-circle-icon"><img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png"></div>
                                <span class="tier-label-sub">${p.rankedtier || 'LT2'}</span>
                            </div>
                            <div class="tier-mini-badge ${classBw}">
                                <div class="tier-circle-icon"><img src="https://cdn-icons-png.flaticon.com/512/2919/2919648.png"></div>
                                <span class="tier-label-sub">${p.bedwarstier || 'LT2'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(playerDataStr, pos, rankTitle) {
            const p = JSON.parse(decodeURIComponent(playerDataStr));
            let cleanUUID = p.uuid.replace(/-/g, "").trim();

            document.getElementById('m-name').innerText = p.jugador;
            document.getElementById('m-img').src = `https://visage.surgeplay.com/bust/128/${cleanUUID}`;
            document.getElementById('m-region').innerText = `Region: ${p.region || 'North America'}`;
            document.getElementById('m-rank').innerText = `⭐ ${rankTitle}`;

            // Configurar caja de posición interna idéntica a la imagen de referencia
            document.getElementById('m-pos-num').innerText = `${pos}.`;
            let modeText = currentMode === 'general' ? 'OVERALL' : currentMode.toUpperCase();
            document.getElementById('m-mode-title').innerText = modeText;
            document.getElementById('m-elo-text').innerText = `(${p.targetPts} points)`;

            // Color del fondo cortado del modal de acuerdo al rango
            const modalBgRank = document.getElementById('m-modal-bg-rank');
            if(pos == 1) modalBgRank.className = "modal-position-left text-black bg-[#e0a910]";
            else if(pos == 2) modalBgRank.className = "modal-position-left text-black bg-[#a1a8b8]";
            else if(pos == 3) modalBgRank.className = "modal-position-left text-white bg-[#cc6925]";
            else modalBgRank.className = "modal-position-left text-gray-300 bg-[#1f293d]";

            // LOGICA REESTRUCTURADA PARA REDES SOCIALES EN FILA EN EL MODAL
            const redesContainer = document.getElementById('redes-container');
            redesContainer.innerHTML = '';
            let contadorRedes = 0;

            const crearEnlaceRed = (url, plataforma, estiloExtra) => {
                if (url && url.trim() !== "") {
                    contadorRedes++;
                    return `<a href="${url.trim()}" target="_blank" class="bg-[#171f30] hover:bg-[#1e2940] border border-gray-800 text-gray-300 text-[10px] font-bold py-2 px-1 rounded text-center transition block truncate">
                        ${plataforma} ↗
                    </a>`;
                }
                return '';
            };

            redesContainer.innerHTML += crearEnlaceRed(p.redes, 'YouTube');
            redesContainer.innerHTML += crearEnlaceRed(p.tiktok, 'TikTok');
            redesContainer.innerHTML += crearEnlaceRed(p.instagram, 'Instagram');

            // Si el jugador no tiene ninguna red agregada en la hoja de cálculo
            if (contadorRedes === 0) {
                redesContainer.className = "block text-center";
                redesContainer.innerHTML = `
                    <a href="${DISCORD_INVITE}" target="_blank" class="bg-[#1f293d] border border-dashed border-gray-700 hover:border-gray-500 text-gray-400 text-[11px] font-black py-2.5 px-4 rounded w-full block transition uppercase tracking-wider">
                         💬 Agregar en Discord
                    </a>
                `;
            } else {
                redesContainer.className = "grid grid-cols-3 gap-2";
            }

            document.getElementById('player-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('player-modal').style.display = 'none'; }
        window.onload = loadData;
    </script>
</body>
</html>
