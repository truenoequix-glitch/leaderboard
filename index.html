<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>zTeam | Leaderboard Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d111a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* TARJETA BASE ESTILO COMPETITIVO */
        .player-card {
            background: linear-gradient(90deg, #111723 0%, #0f1420 100%); 
            border: 1px solid #1f283d;
            border-radius: 8px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.3s ease; cursor: pointer;
            position: relative; overflow: hidden;
            height: 72px;
        }
        .player-card:hover { border-color: #ff4d4d; transform: translateX(5px); }

        /* EFECTO CORTADO DIAGONAL EN LA POSICIÓN */
        .rank-badge-zone {
            height: 100%; width: 140px;
            display: flex; align-items: center; padding-left: 15px;
            position: relative; z-index: 2;
            clip-path: polygon(0 0, 85% 0, 65% 100%, 0% 100%);
        }
        /* COLORES DE FONDO SEGÚN RANGO */
        .bg-top1 { background: linear-gradient(135deg, #e0a910 0%, #8c6603 100%); }
        .bg-top2 { background: linear-gradient(135deg, #a1a8b8 0%, #5d6370 100%); }
        .bg-top3 { background: linear-gradient(135deg, #cc6925 0%, #783a11 100%); }
        .bg-normal-rank { background: linear-gradient(135deg, #1b2436 0%, #131a26 100%); border-right: 2px solid #2d364d; }

        /* TEXTO DE POSICIÓN INTERNA */
        .rank-num-text { font-size: 1.6rem; font-weight: 900; font-style: italic; letter-spacing: -1px; line-height: 1; margin-right: 8px; }

        /* CONTENEDOR DE LA SKIN DENTRO DE LA POSICIÓN */
        .avatar-inside-rank {
            height: 100%; width: 55px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
        }
        .avatar-inside-rank img { height: 110%; object-fit: contain; transform: translateY(8px); }

        /* ANIMACIÓN DE BRILLO REFLEJO CADA 5 SEGUNDOS (TOP 1, 2, 3) */
        .podium-glow::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            animation: sweepGlow 5s infinite ease-in-out;
        }
        @keyframes sweepGlow {
            0% { left: -150%; }
            15% { left: 150%; }
            100% { left: 150%; }
        }

        /* COLORES TIERS */
        .tier-s-plus { color: #ff0000; text-shadow: 0 0 10px rgba(255, 0, 0, 0.6); }
        .tier-s { color: #ff4d4d; }
        .tier-a-plus { color: #ff8c00; }
        .tier-a-minus { color: #ffcc00; }
        .tier-b-plus { color: #00ff00; }
        .tier-b { color: #5555ff; }

        .top1-name {
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900;
        }

        /* MODAL RESPONSIVO */
        #player-modal {
            display: none; position: fixed; inset: 0; background: rgba(5,7,12,0.9);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0f1422; border: 1px solid #25314a; width: 90%; max-width: 460px;
            padding: 25px; border-radius: 16px; position: relative; text-align: center;
        }
        .tier-circle-single {
            width: 40px; height: 40px; background: #171f30; border: 2px solid #2b3752;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem; margin: 0 auto;
        }
        .server-block {
            background: #121824; border: 1px solid #1e293b; border-radius: 8px;
            padding: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .server-block:hover { border-color: #ff4d4d; transform: translateY(-3px); }
        #copy-toast {
            visibility: hidden; min-width: 200px; background-color: #ff4d4d; color: #fff;
            text-align: center; border-radius: 6px; padding: 10px; position: fixed;
            z-index: 200; left: 50%; bottom: 30px; transform: translateX(-50%);
        }
        #copy-toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 md:p-10 bg-[#070a12]">

    <div id="copy-toast">¡IP Copiada!</div>

    <div id="player-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl font-bold" onclick="closeModal()">&times;</button>
            
            <img id="m-img" src="" class="w-20 h-20 mx-auto rounded-full border-4 border-yellow-500 mb-3 bg-[#171f30]">
            <h2 id="m-name" class="text-2xl font-black italic mb-0.5"></h2>
            
            <div id="m-rank" class="inline-block bg-[#1f293d] text-yellow-400 text-[10px] font-black px-3 py-0.5 rounded mb-1 uppercase tracking-wider">
                Combat Ace
            </div>
            
            <p id="m-region" class="text-gray-500 text-xs font-bold mb-4 uppercase"></p>

            <div class="mb-4">
                <p class="text-[9px] font-black text-gray-500 text-left mb-1.5 tracking-widest uppercase">Redes Sociales</p>
                <div id="redes-container" class="flex flex-wrap justify-center gap-2 bg-[#121824] p-3 rounded-lg border border-gray-800">
                    </div>
            </div>

            <div class="text-left mb-4">
                <p class="text-[9px] font-black text-gray-500 mb-1.5 tracking-widest uppercase">Posición / Estadísticas actuales</p>
                <div class="bg-[#171f30] p-2.5 rounded-lg border border-gray-800 flex justify-between items-center">
                    <span id="m-pos" class="italic font-black text-lg text-yellow-400">#1.</span>
                    <span class="text-xs font-bold text-gray-300 uppercase italic">🏆 <span id="m-elo-text" class="text-white font-black"></span></span>
                </div>
            </div>

            <div class="text-left">
                <p class="text-[9px] font-black text-gray-500 mb-1.5 tracking-widest uppercase">Tiers del Competidor</p>
                <div class="space-y-1.5 bg-[#171f30]/40 p-3 rounded-lg border border-gray-800/50">
                    <div class="flex justify-between items-center bg-[#121824] p-2 rounded border border-gray-800">
                        <span class="text-xs font-bold text-gray-300">⚔️ Bedfight</span>
                        <div class="flex items-center gap-2"><span id="m-pts-bf" class="text-[11px] text-gray-400 font-bold">0 PTS</span><div id="m-tier-bf" class="tier-circle-single"></div></div>
                    </div>
                    <div class="flex justify-between items-center bg-[#121824] p-2 rounded border border-gray-800">
                        <span class="text-xs font-bold text-gray-300">🏅 Ranked BW</span>
                        <div class="flex items-center gap-2"><span id="m-pts-rk" class="text-[11px] text-gray-400 font-bold">0 PTS</span><div id="m-tier-rk" class="tier-circle-single"></div></div>
                    </div>
                    <div class="flex justify-between items-center bg-[#121824] p-2 rounded border border-gray-800">
                        <span class="text-xs font-bold text-gray-300">🛏️ Bedwars</span>
                        <div class="flex items-center gap-2"><span id="m-pts-bw" class="text-[11px] text-gray-400 font-bold">0 PTS</span><div id="m-tier-bw" class="tier-circle-single"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col sm:flex-row items-center justify-between bg-black p-4 rounded-xl border-2 border-[#ff4d4d] mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-[#ff4d4d] p-3 rounded shadow-lg"><h1 class="text-2xl font-black italic tracking-tighter text-black">ZTEAM</h1></div>
                <div>
                    <h2 class="text-lg font-bold leading-tight">Leaderboard Oficial</h2>
                    <p class="text-[10px] text-[#ff4d4d] font-black uppercase tracking-widest">Comunidad Competitiva</p>
                </div>
            </div>
            <a href="https://discord.gg/XG8EpJXuXv" target="_blank" class="transition-transform hover:scale-105">
                <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" alt="Discord" class="w-10 h-10">
            </a>
        </div>

        <div class="mb-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-1.5 bg-[#111723] p-1.5 rounded-lg border border-gray-800">
                <button onclick="changeMode('general')" id="btn-general" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition bg-[#ff4d4d] text-black">🌍 General</button>
                <button onclick="changeMode('bedfight')" id="btn-bedfight" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">⚔️ Bedfight</button>
                <button onclick="changeMode('ranked')" id="btn-ranked" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">🏅 Ranked BW</button>
                <button onclick="changeMode('bedwars')" id="btn-bedwars" class="py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400">🛏️ Bedwars</button>
            </div>
        </div>

        <div id="leaderboard" class="space-y-2.5"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTlfD0FvQ-kVK2leat4n9qOvfu3zJ8rlv-B8qm9434NOMGCV4pOyw7B-cchbzFCpKCVSOGFhCI0YST_/pub?output=csv';
        const DISCORD_INVITE = "https://discord.gg/XG8EpJXuXv";

        let globalPlayersData = [];
        let currentMode = 'general';

        function getTierClass(tier) {
            let t = tier ? tier.trim().toUpperCase() : "B";
            if (t === "S+") return "tier-s-plus";
            if (t === "S") return "tier-s";
            if (t === "A+") return "tier-a-plus";
            if (t === "A-") return "tier-a-minus";
            if (t === "B+") return "tier-b-plus";
            return "tier-b";
        }

        function changeMode(mode) {
            currentMode = mode;
            ['general', 'bedfight', 'ranked', 'bedwars'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                btn.className = (m === mode) 
                    ? "py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition bg-[#ff4d4d] text-black"
                    : "py-2 px-3 rounded text-xs font-black uppercase tracking-wider transition hover:bg-gray-800 text-gray-400";
            });
            renderLeaderboard();
        }

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    globalPlayersData = results.data.map(row => {
                        let normalizedRow = {};
                        for (let key in row) {
                            let cleanKey = key.trim().toLowerCase().replace(/[\s_]/g, '');
                            normalizedRow[cleanKey] = row[key];
                        }
                        return normalizedRow;
                    }).filter(r => r.uuid);
                    renderLeaderboard();
                }
            });
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';

            let sortedPlayers = globalPlayersData.map(p => {
                let bfPts = parseInt(p.bedfightpuntos || 0);
                let rkPts = parseInt(p.rankedpuntos || 0);
                let bwPts = parseInt(p.bedwarspuntos || 0);
                
                if (isNaN(bfPts)) bfPts = 0;
                if (isNaN(rkPts)) rkPts = 0;
                if (isNaN(bwPts)) bwPts = 0;

                let totalPts = bfPts + rkPts + bwPts;
                let targetPts = totalPts;
                let targetTier = p.tier || "B";

                if (currentMode === 'bedfight') { targetPts = bfPts; targetTier = p.bedfighttier || "B"; }
                else if (currentMode === 'ranked') { targetPts = rkPts; targetTier = p.rankedtier || "B"; }
                else if (currentMode === 'bedwars') { targetPts = bwPts; targetTier = p.bedwarstier || "B"; }

                return { ...p, bfPts, rkPts, bwPts, totalPts, targetPts, targetTier };
            });

            sortedPlayers.sort((a, b) => b.targetPts - a.targetPts);

            sortedPlayers.forEach((p, index) => {
                let rank = index + 1;
                let cleanUUID = p.uuid.replace(/-/g, "").trim();
                let tierClass = getTierClass(p.targetTier);
                
                // Zona Cortada Dinámica segun el Podio
                let rankZoneClass = "bg-normal-rank";
                let podiumCardClass = "";
                if (rank === 1) { rankZoneClass = "bg-top1"; podiumCardClass = "podium-glow border-yellow-600/60"; }
                else if (rank === 2) { rankZoneClass = "bg-top2"; podiumCardClass = "podium-glow border-slate-500/60"; }
                else if (rank === 3) { rankZoneClass = "bg-top3"; podiumCardClass = "podium-glow border-amber-800/60"; }

                let rankNumColor = rank === 1 ? "text-yellow-100" : (rank === 2 ? "text-slate-100" : (rank === 3 ? "text-orange-100" : "text-gray-400"));
                let pString = encodeURIComponent(JSON.stringify(p));

                let rankTitle = "Combat Ace";
                if(p.targetPts >= 100) rankTitle = "Combat Master";
                if(p.targetPts >= 550) rankTitle = "Combat Sorcerer";

                container.innerHTML += `
                    <div class="player-card ${podiumCardClass}" onclick="openModal('${pString}', '${rank}', '${rankTitle}')">
                        <div class="flex items-center h-100 h-full">
                            <div class="rank-badge-zone ${rankZoneClass}">
                                <span class="rank-num-text ${rankNumColor}">${rank}.</span>
                                <div class="avatar-inside-rank">
                                    <img src="https://visage.surgeplay.com/bust/64/${cleanUUID}" onerror="this.src='https://visage.surgeplay.com/bust/64/steve'">
                                </div>
                            </div>
                            
                            <div class="ml-4">
                                <div class="font-black uppercase italic text-md md:text-lg leading-tight ${rank === 1 ? 'top1-name' : 'text-gray-100'}">${p.jugador}</div>
                                <div class="flex items-center gap-2">
                                    <span class="bg-[#1f293d] text-gray-400 text-[8px] font-bold px-1.5 rounded uppercase tracking-wider">${p.region || 'NA'}</span>
                                </div>
                            </div>
                        </div>

                        <div class="text-right pr-4 flex items-center gap-6">
                            <div class="hidden md:block">
                                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Puntuación</p>
                                <p class="text-sm font-black text-white">${p.targetPts} PTS</p>
                            </div>
                            <div class="text-center min-w-[45px]">
                                <div class="font-black text-xl italic tracking-tighter ${tierClass}">${p.targetTier}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(playerDataStr, pos, rankTitle) {
            const p = JSON.parse(decodeURIComponent(playerDataStr));
            let cleanUUID = p.uuid.replace(/-/g, "").trim();

            document.getElementById('m-name').innerText = p.jugador;
            document.getElementById('m-name').className = (pos == 1) ? "text-2xl italic top1-name" : "text-2xl font-black italic text-white";
            document.getElementById('m-img').src = `https://visage.surgeplay.com/bust/128/${cleanUUID}`;
            document.getElementById('m-region').innerText = `Región Oficial: ${p.region || 'NA'}`;
            
            let modeLabel = currentMode === 'general' ? 'Puntos Totales' : `Puntos en ${currentMode.toUpperCase()}`;
            document.getElementById('m-elo-text').innerText = `${p.targetPts} ${modeLabel}`;
            document.getElementById('m-pos').innerText = `#${pos} en Ranking`;
            document.getElementById('m-rank').innerText = rankTitle;
            document.getElementById('m-namemc').href = `https://namemc.com/profile/${p.jugador}`;
            
            // PROCESAMIENTO DINÁMICO DE REDES SOCIALES
            const redesContainer = document.getElementById('redes-container');
            redesContainer.innerHTML = '';
            let tieneAlgunaRed = false;

            const agregarBotonRed = (url, texto, bgColor) => {
                if (url && url.trim() !== "") {
                    tieneAlgunaRed = true;
                    redesContainer.innerHTML += `
                        <a href="${url.trim()}" target="_blank" class="${bgColor} hover:opacity-90 text-white text-[10px] px-3 py-1.5 rounded transition font-black tracking-wider uppercase">
                            ${texto} ↗
                        </a>
                    `;
                }
            };

            agregarBotonRed(p.tiktok, 'TikTok', 'bg-gradient-to-r from-pink-500 to-cyan-500');
            agregarBotonRed(p.instagram, 'Instagram', 'bg-gradient-to-r from-purple-600 to-pink-500');
            agregarBotonRed(p.redes, 'Otras Redes', 'bg-blue-600');

            // Si no tiene ninguna red registrada en el Excel, añade el botón por defecto de Discord
            if (!tieneAlgunaRed) {
                redesContainer.innerHTML = `
                    <a href="${DISCORD_INVITE}" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] px-4 py-2 w-full rounded text-center transition font-black tracking-wide uppercase">
                        👾 Agregar en Discord
                    </a>
                `;
            }

            // Actualizar desgloses de Tiers y Puntos internos del Modal
            document.getElementById('m-pts-bf').innerText = `${p.bfPts} PTS`;
            document.getElementById('m-pts-rk').innerText = `${p.rkPts} PTS`;
            document.getElementById('m-pts-bw').innerText = `${p.bwPts} PTS`;

            setModalTierCircle('m-tier-bf', p.bedfighttier || 'B');
            setModalTierCircle('m-tier-rk', p.rankedtier || 'B');
            setModalTierCircle('m-tier-bw', p.bedwarstier || 'B');
            
            document.getElementById('player-modal').style.display = 'flex';
        }

        function setModalTierCircle(elementId, tierValue) {
            const circle = document.getElementById(elementId);
            circle.innerText = tierValue;
            circle.className = `tier-circle-single ${getTierClass(tierValue)}`;
        }

        function closeModal() { document.getElementById('player-modal').style.display = 'none'; }
        function copyIP(ip) { navigator.clipboard.writeText(ip); var x = document.getElementById("copy-toast"); x.className = "show"; setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000); }
        window.onload = loadData;
    </script>
</body>
</html>
